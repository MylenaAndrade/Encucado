services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: encucado-api
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://encucado:encucado@db:5432/encucado?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: encucado-db
    environment:
      POSTGRES_DB: encucado
      POSTGRES_USER: encucado
      POSTGRES_PASSWORD: encucado
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U encucado -d encucado"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
